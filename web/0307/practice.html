<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice</title>
</head>
<body>
  <!--태그 확인하기-->
  <p>p태그는 단락 만들기</p>
  단락만들면 한줄 띄어진다
  <p>
    p태그 안에서 줄바꾸기는 <br>br이용
  </p>

  <blockquote>blockquote 인용문</blockquote>
  
  <br>
  입력하는      그대로
  화면에     표기하려면
  <pre>pre    태그를    사용하기   !!</pre>


  <strong>굵게하기!!strong</strong><br>
  <em>이텔릭 em</em><br>
  <q>인용 내용을 적을 때 q tag</q><br>
  <mark>형광펜</mark><br>
  줄긋기는 hr
  <hr>
  
  <ul> <!--unorderd list-->
    <li>파이썬</li>
    <li>자바</li>
    <li>씨</li>
  </ul>
  
  <ol start="3" type="i"> <!--orderd list-->
    <li>파이썬</li>
    <li>자바</li>
    <li>씨</li>
  </ol>

  <a href="https://www.naver.com">
   누르면 네이버로 이동
  </a><br>

  <!--input tag-->
  <p>아이디: <input type="text"></p>
  <p>아이디: <input type="text"autofocus></p>
  <!--autofocus는 커서위치 시작-->
  비밀번호 : <input type="password">
  <hr>


  <form action="서버페이지의 url넣기">
    <p>email을 적어 주세요</p>
    <input type="email">
    <input type="submit">
  </form>
  <br>

  <input type="button" value="절대로 이 버튼을 누르지 마시오"><br>
  <input type="number"> <br>
  <input type="checkbox"> <br>
  <input type="radio"> <br>
  <input type="submit"> <br>
  <input type="file"> <br>
  <input type="date"><br>

  <label for="asdf">여기 클릭 해 보세요</label>
  <input id="asdf" type="checkbox"><br>
  <!--글자를 클릭해도 됨 !-->
  <label>여기 클릭 해 보세요</label>
  <input type="checkbox">

  <select> <!--value값 넣는 이유는 한글 전송 문제-->
    <option value="python">파이썬</option>
    <option value="java">자바</option>
    <option value="c">씨</option>
  </select>



</body>
</html>
