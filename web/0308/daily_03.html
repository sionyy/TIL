<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div>
    <div><p>자식</p></div>
    <span><p>손자</p></span>
    <div><p>자식</p></div>
  </div>
</body>

<style>
/* 자손결합자는 하위 모든 항목에 스타일 정의 */
div {
  height: 20px;
  width: 80px;
}
div p{
  color: blue;
}
/* 자식결합자는 직계자식항목에 스타일 정의 */
div>p {
  color: crimson;
}
span{text-align: right;}

</style>
</html>
